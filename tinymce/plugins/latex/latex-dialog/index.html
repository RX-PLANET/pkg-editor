<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <title>LaTeX 编辑器</title>
        <script>
            (function () {
                const params = new URLSearchParams(window.location.search);
                const dialogBase = params.get("dialogBase") || new URL("latex-dialog/", window.location.href).href;
                window.LATEX_DIALOG_BASE = dialogBase;

                function loadCSS(file) {
                    const link = document.createElement("link");
                    link.rel = "stylesheet";
                    link.href = new URL(file, dialogBase).href;
                    document.head.appendChild(link);
                }

                loadCSS("index.css");
                loadCSS("katex.min.css");
            })();
        </script>
    </head>
    <body>
        <div class="container">
            <!-- 左侧 -->
            <div class="left">
                <!-- Tabs + 外链 -->
                <div class="tabs-header">
                    <div class="tabs">
                        <div class="tab active" data-tab="usage">使用方法</div>
                        <div class="tab" data-tab="help">使用帮助</div>
                    </div>

                    <a class="external-link" href="https://www.latex-project.org/" target="_blank"> 查看文档 → </a>
                </div>

                <!-- Tab 内容 -->
                <div class="tabs-content">
                    <div class="tab-pane active" data-tab="usage">
                        <!-- 先留空 -->
                    </div>
                    <div class="tab-pane" data-tab="help">
                        <!-- 先留空 -->
                    </div>
                </div>
            </div>

            <!-- 右侧 -->
            <div class="right">
                <!-- 输入区 -->
                <textarea id="latex-input" placeholder="请输入 LaTeX 代码，例如：\frac{a}{b}"></textarea>

                <!-- 渲染区 -->
                <div id="latex-preview">
                    <span class="placeholder">公式预览</span>
                </div>
            </div>
        </div>

        <!-- 底部按钮 -->
        <div class="footer">
            <button id="cancel">取消</button>
            <button id="insert" class="primary">插入</button>
        </div>

        <script>
            (function () {
                const params = new URLSearchParams(window.location.search);
                const dialogBase = params.get("dialogBase") || new URL("latex-dialog/", window.location.href).href;
                window.LATEX_DIALOG_BASE = dialogBase;

                function loadScript(file) {
                    return new Promise((resolve, reject) => {
                        const script = document.createElement("script");
                        script.src = new URL(file, dialogBase).href;
                        script.onload = resolve;
                        script.onerror = reject;
                        document.body.appendChild(script);
                    });
                }

                loadScript("katex.min.js")
                    .then(() => loadScript("katex-standalone.js"))
                    .then(() => loadScript("index.js"))
                    .catch((error) => console.error("LaTeX dialog script load failed:", error));
            })();
        </script>
    </body>
</html>
